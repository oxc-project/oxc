packages:
  - apps/*
  - napi/*
  - wasm/*
  - npm/*
  - tasks/e2e
  - tasks/transform_conformance
  - tasks/compat_data
  - tasks/mcp

catalog:
  "@arethetypeswrong/core": 0.18.2
  "@napi-rs/cli": 3.5.1
  "@napi-rs/wasm-runtime": 1.1.1
  "@types/node": 24.1.0
  cross-env: ^10.1.0
  eslint: 9.39.3
  json-schema-to-typescript: ^15.0.4
  publint: 0.3.17
  rolldown: 1.0.0-rc.6
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest

onlyBuiltDependencies:
  - "@vscode/vsce-sign@2.0.8"
  - esbuild@0.25.11

verifyDepsBeforeRun: install
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
