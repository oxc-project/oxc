[package]
name = "oxc_transform_napi"
version = "0.141.0"
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
include = ["/src", "build.rs"]
keywords.workspace = true
license.workspace = true
publish = true
repository.workspace = true
rust-version.workspace = true
description.workspace = true

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "lib"]
test = false
doctest = false

[dependencies]
oxc = { workspace = true, features = ["full"] }
oxc_napi = { workspace = true }
oxc_sourcemap = { workspace = true, features = ["napi"] }

rustc-hash = { workspace = true }

napi = { workspace = true }
napi-derive = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
mimalloc-safe = { workspace = true, optional = true, features = ["skip_collect_on_exit"] }

[target.'cfg(all(target_os = "linux", not(target_arch = "arm"), not(target_arch = "aarch64")))'.dependencies]
mimalloc-safe = { workspace = true, optional = true, features = [
  "skip_collect_on_exit",
  "local_dynamic_tls",
] }

[target.'cfg(all(target_os = "linux", target_arch = "aarch64"))'.dependencies]
mimalloc-safe = { workspace = true, optional = true, features = [
  "skip_collect_on_exit",
  "local_dynamic_tls",
  "no_opt_arch",
] }

[build-dependencies]
napi-build = { workspace = true }

[features]
# On by default so the published binary supports the `reactCompiler` option that
# `index.d.ts` advertises. The generated `.d.ts` does not depend on this feature — the
# option types are unconditional (see `src/react_compiler.rs`), so a
# `--no-default-features` build regenerates a byte-identical one and CI's
# `git diff --exit-code` holds either way. Opting out only drops the (heavy) compiler
# from the binary; passing `reactCompiler` to such a build is then a hard error rather
# than a silent no-op.
default = ["react_compiler"]
allocator = ["dep:mimalloc-safe"]
react_compiler = ["oxc/react_compiler"]
