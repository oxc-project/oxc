[package]
name = "oxc_linter"
version = "1.65.0"
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
include = ["/examples", "/src"]
keywords.workspace = true
license.workspace = true
publish = false
repository.workspace = true
rust-version.workspace = true
description.workspace = true

[features]
default = []
ruledocs = [
  "oxc_linter_core/ruledocs",
  "oxc_linter_rules/ruledocs",
] # Enables the `ruledocs` feature for conditional compilation
force_test_reporter = []

[lints]
workspace = true

[lib]
doctest = true

[dependencies]
oxc_linter_core = { workspace = true }
oxc_linter_rules = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
lazy-regex = { workspace = true }
markdown = { workspace = true }
oxc_allocator = { workspace = true }
oxc_ast = { workspace = true }
oxc_diagnostics = { workspace = true }
oxc_macros = { workspace = true, features = ["ruledocs"] }
oxc_parser = { workspace = true }
oxc_semantic = { workspace = true, features = ["cfg", "linter"] }
oxc_span = { workspace = true }
rustc-hash = { workspace = true }
schemars = { workspace = true, features = ["indexmap2", "regex"] }
serde_json = { workspace = true, features = ["preserve_order"] }
