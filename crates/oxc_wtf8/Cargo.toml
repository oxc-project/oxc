[package]
name = "oxc_wtf8"
version = "0.122.0"
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
include = ["/src"]
keywords.workspace = true
license.workspace = true
publish = true
repository.workspace = true
rust-version.workspace = true
description.workspace = true
readme = "README.md"

[lints]
workspace = true

[lib]
doctest = true

[dependencies]
oxc_allocator = { workspace = true }
oxc_span = { workspace = true }
oxc_str = { workspace = true }

oxc_estree = { workspace = true, optional = true, features = ["serialize"] }
oxc_data_structures = { workspace = true, optional = true, features = ["code_buffer"] }
serde = { workspace = true, optional = true }

[features]
default = []
serialize = ["dep:serde", "dep:oxc_estree", "dep:oxc_data_structures"]
