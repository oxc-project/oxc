# oxc_react_compiler
#
# Native oxc integration for the Rust port of the React Compiler:
# https://github.com/react/react/tree/main/compiler
#
# This crate runs the React Compiler directly over the live workspace oxc AST.
# The React Compiler *core* (a Rust port of the MIT React Compiler) is vendored
# in `src/react_compiler*` — frontend-agnostic modules with no oxc dependency.
# The scope conversion (`convert_scope.rs`) lives alongside it, written against
# the oxc AST. TS types and unmodeled nodes round-trip by re-parsing their source
# span, so the compiler carries no JSON/serde layer.

[package]
name = "oxc_react_compiler"
version = "0.137.0"
publish = true
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "oxc integration for the Rust port of React Compiler"

[lib]
doctest = false

[features]
# Off by default. Gates the heavy HIR / reactive-function debug (IR-dump)
# printers, which only run when `PluginOptions.debug` is set. Excluding them from
# the default build trims ~100 KiB of code with no effect on transform/lint.
debug = []

[dependencies]
oxc_allocator = { workspace = true }
oxc_ast = { workspace = true }
oxc_ast_visit = { workspace = true }
oxc_codegen = { workspace = true }
oxc_diagnostics = { workspace = true }
oxc_parser = { workspace = true }
oxc_semantic = { workspace = true }
oxc_span = { workspace = true }
oxc_syntax = { workspace = true }

hmac-sha256 = { workspace = true }
indexmap = { workspace = true }
rustc-hash = { workspace = true }

# The `src/` conversion modules are vendored close to upstream `react_compiler_oxc`
# (kept near byte-for-byte to ease re-syncing), so relax the handful of lints they
# trip here rather than editing the code. Defining `[lints.clippy]` means this crate
# does not inherit `[lints] workspace = true`, which keeps the in-house restriction
# lints (`todo!`/`unimplemented!`/...) off the vendored code while clippy's default
# correctness and perf checks still apply.
[lints.clippy]
disallowed_types = "allow" # `ScopeInfo`/`ScopeData` fields are std `HashMap`
collapsible_if = "allow"
needless_return = "allow"
unnecessary_unwrap = "allow"

# The vendored modules' doc comments reference types like `Vec<PatternLike>`
# without backticks; relax rustdoc for them rather than editing upstream code.
[lints.rustdoc]
broken_intra_doc_links = "allow"
invalid_html_tags = "allow"
bare_urls = "allow"
