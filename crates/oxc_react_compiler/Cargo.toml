# oxc_react_compiler
#
# Native oxc integration for the Rust port of the React Compiler:
# https://github.com/react/react/tree/main/compiler
#
# This crate owns the oxc <-> react_compiler_ast conversion layer, plus the React
# Compiler *core* itself, vendored in-tree under `src/react_compiler*` (one module
# per upstream crate, from the MIT fork at oxc-project/forked-react-compiler). The
# core is frontend-agnostic (serde/indexmap only, never oxc); the AST/scope
# conversion on our side is written against the live workspace oxc AST.

[package]
name = "oxc_react_compiler"
version = "0.138.0"
publish = true
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "oxc integration for the Rust port of React Compiler"

[lib]
doctest = false
test = false

[features]
# Compile in the HIR debug printer (`react_compiler::debug_print`). Off by default;
# the runtime `PluginOptions::debug` flag only produces output when this is enabled.
debug = []

[dependencies]
oxc_allocator = { workspace = true }
oxc_ast = { workspace = true }
oxc_ast_visit = { workspace = true }
oxc_diagnostics = { workspace = true }
oxc_semantic = { workspace = true }
oxc_span = { workspace = true }
oxc_syntax = { workspace = true }

# External crates the vendored React Compiler modules (`src/react_compiler*`) depend
# on. The compiler core is frontend-agnostic — serde/indexmap/hashing only, no oxc.
hmac-sha256 = { workspace = true }
indexmap = { workspace = true }
rustc-hash = { workspace = true }

[dev-dependencies]
# The example and integration tests parse source and print the compiled program; the
# library itself takes an already-parsed `Program` and never parses or codegens.
oxc_codegen = { workspace = true }
oxc_parser = { workspace = true }

# Catch usage of old `AstBuilder` APIs in tests, without affecting downstream consumers.
# If we enabled `disable_old_builder` feature in main dependency, feature unification would
# cause it to be activated for `oxc_ast` for the user too.
oxc_ast = { workspace = true, features = ["disable_old_builder"] }

# The `src/` conversion modules are vendored close to upstream `react_compiler_oxc`
# (kept near byte-for-byte to ease re-syncing), so relax the handful of lints they
# trip here rather than editing the code. Defining `[lints.clippy]` means this crate
# does not inherit `[lints] workspace = true`, which keeps the in-house restriction
# lints (`todo!`/`unimplemented!`/...) off the vendored code while clippy's default
# correctness and perf checks still apply.
[lints.clippy]
disallowed_types = "allow" # `react_compiler_ast`'s `ScopeInfo`/`ScopeData` fields are std `HashMap`
collapsible_if = "allow"
needless_return = "allow"
unnecessary_unwrap = "allow"

# The vendored modules' doc comments reference types like `Vec<PatternLike>`
# without backticks; relax rustdoc for them rather than editing upstream code.
[lints.rustdoc]
broken_intra_doc_links = "allow"
invalid_html_tags = "allow"
bare_urls = "allow"
