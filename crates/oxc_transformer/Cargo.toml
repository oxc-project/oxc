[package]
name = "oxc_transformer"
version = "0.137.0"
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
include = ["/examples", "/src"]
keywords.workspace = true
license.workspace = true
publish = true
repository.workspace = true
rust-version.workspace = true
description.workspace = true

[lints]
workspace = true

[lib]
test = true
doctest = false

[dependencies]
oxc_allocator = { workspace = true }
oxc_ast = { workspace = true }
oxc_ast_visit = { workspace = true }
oxc_compat = { workspace = true }
oxc_data_structures = { workspace = true, features = [
  "assert_unchecked",
  "inline_string",
  "rope",
  "slice_iter",
  "stack",
] }
oxc_diagnostics = { workspace = true }
oxc_ecmascript = { workspace = true }
oxc_react_compiler = { workspace = true, optional = true }
oxc_regular_expression = { workspace = true }
oxc_semantic = { workspace = true }
oxc_span = { workspace = true }
oxc_str = { workspace = true }
oxc_syntax = { workspace = true, features = ["to_js_string"] }
oxc_traverse = { workspace = true }

base64 = { workspace = true }
compact_str = { workspace = true }
hmac-sha1-compact = { workspace = true }
indexmap = { workspace = true }
itoa = { workspace = true }
memchr = { workspace = true }
rustc-hash = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
oxc_codegen = { workspace = true, features = ["sourcemap"] }
oxc_parser = { workspace = true }
pico-args = { workspace = true }

# Catch usage of old `AstBuilder` APIs in tests, without affecting downstream consumers.
# if we enabled `disable_old_builder` feature in main dependency, feature unification would
# cause it to be activated for `oxc_ast` for the user too.
oxc_ast = { workspace = true, features = ["disable_old_builder"] }

[features]
# Run the experimental React Compiler as the first transform pass.
react_compiler = ["dep:oxc_react_compiler"]
