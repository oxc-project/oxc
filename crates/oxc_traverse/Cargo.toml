[package]
name = "oxc_traverse"
version = "0.138.0"
authors.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true
include = ["/src"]
keywords.workspace = true
license.workspace = true
publish = true
repository.workspace = true
rust-version.workspace = true
description.workspace = true

[lints]
workspace = true

[lib]
test = true
# Doctests must be enabled for this crate as they are used to run tests
# which check the soundness of its code
doctest = true

[dependencies]
oxc_allocator = { workspace = true }
oxc_ast = { workspace = true }
oxc_ast_visit = { workspace = true }
oxc_data_structures = { workspace = true, features = ["stack", "string_ext"] }
oxc_ecmascript = { workspace = true }
oxc_semantic = { workspace = true }
oxc_span = { workspace = true }
oxc_str = { workspace = true }
oxc_syntax = { workspace = true }

itoa = { workspace = true }
rustc-hash = { workspace = true }

[dev-dependencies]
# Catch usage of old `AstBuilder` APIs in tests, without affecting downstream consumers.
# If we enabled `disable_old_builder` feature in main dependency, feature unification would
# cause it to be activated for `oxc_ast` for the user too.
oxc_ast = { workspace = true, features = ["disable_old_builder"] }
