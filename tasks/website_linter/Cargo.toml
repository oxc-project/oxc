[package]
name = "website_linter"
version = "0.0.0"
edition.workspace = true
license.workspace = true
publish = false

[lints]
workspace = true

[[bin]]
name = "website_linter"
doctest = false

[dependencies]
bpaf = { workspace = true, features = ["docgen"] }
itertools = { workspace = true }
oxc_ast = { workspace = true, features = ["disable_old_builder"] }
oxc_linter = { workspace = true, features = ["ruledocs"] }
oxlint = { workspace = true, features = ["ruledocs"] }
pico-args = { workspace = true }
project-root = { workspace = true }
schemars = { workspace = true }
website_common = { workspace = true }

[dev-dependencies]
insta = { workspace = true }

[package.metadata.cargo-shear]
# `oxc_ast` is a feature-only dependency, to enable its `disable_old_builder` feature
ignored = ["bpaf", "oxc_ast"]
