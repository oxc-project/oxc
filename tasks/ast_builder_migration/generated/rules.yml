language: rust
rule:
  pattern: "ArenaBox::new_in(AssignmentTargetWithDefault::new($$$ARGS), $ALLOC)"
transform:
  NOCOMMENT:
    replace:
      source: "$$$ARGS"
      replace: ",\\s*//\\s*(.*)$"
      by: " /* $1 */"
fix: "AssignmentTargetWithDefault::boxed($NOCOMMENT)"
