[package]
name = "oxc_minsize"
version = "0.0.0"
edition.workspace = true
license.workspace = true
publish = false

[lints]
workspace = true

[lib]
doctest = false

[[bin]]
name = "oxc_minsize"
test = false
doctest = false

[dependencies]
oxc_allocator = { workspace = true }
oxc_ast = { workspace = true, features = ["disable_old_builder"] }
oxc_codegen = { workspace = true, features = ["sourcemap"] }
oxc_minifier = { workspace = true }
oxc_parser = { workspace = true }
oxc_semantic = { workspace = true }
oxc_span = { workspace = true }
oxc_tasks_common = { workspace = true }
oxc_transformer_plugins = { workspace = true }

cow-utils = { workspace = true }
flate2 = { workspace = true }
lazy-regex = { workspace = true }
humansize = { workspace = true }
pico-args = { workspace = true }
rustc-hash = { workspace = true }
similar-asserts = { workspace = true }

# `oxc_ast` is a feature-only dependency, to enable its `disable_old_builder` feature
[package.metadata.cargo-shear]
ignored = ["oxc_ast"]
