            "crates/oxc_transformer*/**",
            "crates/oxc_traverse/**",
            "tasks/transform_conformance/**",
            "napi/transform/**",
          ]

A-linter:
  - changed-files:
      - any-glob-to-any-file:
          [
            "crates/oxc_linter/**",
            "apps/oxlint/**",
            "tasks/lint_rules/**",
            "tasks/linter_codegen/**",
            "tasks/rulegen/**",
            "tasks/track_linter_timings/**",
