      - any-glob-to-any-file:
          ["crates/oxc_ast/**", "crates/oxc_ast_macros/**", "crates/oxc_ast_visit/**"]

A-ast-tools:
  - changed-files:
      - any-glob-to-any-file: ["tasks/ast_tools/**"]

A-cfg:
  - changed-files:
      - any-glob-to-any-file: ["crates/oxc_cfg/**"]

A-cli:
  - changed-files:
